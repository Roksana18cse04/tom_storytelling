name: CI-CD

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/tom_storytelling:latest" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t "$IMAGE_NAME" .

      - name: Push Docker image
        run: docker push "$IMAGE_NAME"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/tom_storytelling:latest"
            APP_DIR="${{ secrets.EC2_APP_PATH }}"

            cd "$APP_DIR"
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
            docker pull "$IMAGE_NAME"
            docker stop tom_storytelling || true
            docker rm tom_storytelling || true
            docker run -d \
              --name tom_storytelling \
              --restart unless-stopped \
              --env-file "$APP_DIR/.env" \
              -p 8000:8000 \
              -v "$APP_DIR/user_images:/app/user_images" \
              "$IMAGE_NAME"
